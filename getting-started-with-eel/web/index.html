<body>
    <section class="wellcome_area clearfix" id="home">
        <div class="container h-100">
<!--            navbar code starts -->
                    <button class="button" id="lgt">Light</button>

            <div class="user-prof">
          <button class="show">
            <span></span>

          <div class="portf">

            <center><h6 class="user-name" >Aish Grace</h6></center>
            <main class="happy" >
                <p class="happy-text" >Happy&nbsp;Client</p>

                <img class="happy-img" src="https://cdn-icons-png.flaticon.com/512/3176/3176367.png">
            </main>
          </div>
          </div>
          <ul class="menu">
            <li ><img src="home.png" style="width:33px; margin-top:-8px;  "><a href="#">Home</a></li>
            <li ><img src="search.png" style="width:33px; margin-top:-8px; "><a href="#">Search</a></li>
            <li ><img src="https://cdn-icons-png.flaticon.com/512/907/907786.png" style="width:33px; margin-top:-8px; "><a href="#">Your Library</a></li>
            <li ><img src="download.png" style="width:33px; margin-top:-8px; "><a href="#">Download Songs</a></li>
            <li ><img src="spotify.png" style="width:29px; margin-top:-8px; "><a href="#">Listen via Spotify</a></li>
          </ul>
        </div>

            <label class="switch">

                <img src="https://cdn-icons-png.flaticon.com/512/5257/5257712.png" class="sun" style="height:27px;">

                <input type="checkbox" id="togBtn" onclick="validate()">
                <div class="slider round"></div>
<!--                <i class="fas fa-moon moon"></i>-->
                <img src="https://cdn-icons-png.flaticon.com/512/4643/4643543.png" class="moon" id="moon" style="height:27px;">

            </label>
            <div class="row h-100 align-items-center">
                <div class="col-12 col-md">
                    <div class="wellcome-heading">
                        <h2>
                            Magic
                            <img id="headphone" src="music.png" style="height:87px;width:87px;">
                            Music</h2>
                        <h3><img src="https://cdn-icons-png.flaticon.com/512/432/432492.png"></h3>
                        <p>
                            Turn any kind of mood into Bliss
                            <img src="https://cdn-icons-png.flaticon.com/512/1504/1504165.png" style="height:33px;width:33px;">
                        </p>
                    </div>
                    <div class="get-start-area">
                        <form class="form-inline">
<!--                            <input type="text" id="data" class="form-control email" placeholder="Enter text">-->
<!--                            <input type="button" id="repeat" class="submit" value="▶ Shower" onclick="generateQRCode(7)">-->
                            <button id="shuffle1" class="shuffle pop" type="button" onclick="generateQRCode(7)"></button>

                            <button id="prev" class="shuffle pop" type="button" onclick="generateQRCode(9)"></button>

<!--                            <input type="button" id="spl" class="submit" value="▶ Play" onclick="generateQRCode(2)">-->
                            <button id="spl" class="play pop" type="button" onclick="generateQRCode(2)"></button>
<!--                            <input type="button" class="submit" value=">> Skip" onclick="generateQRCode(3)">-->
                            <button id="shuffle" class="shuffle pop" type="button" onclick="generateQRCode(3)"></button>
                            <button id="loop" class="shuffle pop" type="button" onclick="generateQRCode(0)"></button>
                            <div class="next-song">
                                <h3>Up Next</h3>
                                <output id="next-name"></output>
                            </div>
                            <div class="sliderContainer">
                                <img src="https://cdn-icons-png.flaticon.com/512/945/945174.png" id="vol">
                                 <input type="range" value="15" min="0" max="100" id="slider" oninput="showVal(this.value)" onchange="showVal(this.value)">
                                 <span id='output' >15</span>
                            </div>

                        </form>
                    </div>
                </div>

        <div class="welcome-thumb ">
            <img id="qr" class="headshot headshot-1" src="img/bg-img/play.jpg" width="50%">
